<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bucodental - Demo</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script defer src="/static/app.js"></script>
</head>
<body>
  <div class="container">
    <main class="card">
      <h1 class="titulo">Clasificación Bucodental</h1>
      <form id="form">
        <label>Modelo
          <select id="modelSelect"></select>
        </label>
        <label>Imagen
          <input type="file" id="file" accept="image/*" required />
        </label>
        <button type="submit">Predecir</button>
      </form>
      <section id="result" style="display:none">
        <h2>Resultado</h2>
        <div id="info"></div>
        <img id="gradcam" alt="Grad-CAM" />
      </section>
    </main>
    <main class="card card-secundaria">
      <h2>Resultados del entrenamiento (opcional)</h2>
      <p>Si copiaste la carpeta <b>backend/resultados</b>, podrás abrir imágenes desde el backend:</p>
      <div class="ejemplo">Ej: http://localhost:8000/resultados/CARIES/training_accuracy.png</div>
    </main>
  </div>
</body>
</html>
