<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bucodental - Demo</title>
  <link rel="stylesheet" href="/static/styles.css">
  <script defer src="/static/app.js"></script>
</head>
<body>

  <!-- ── Pantalla 1: Selección de enfermedad ── -->
  <div id="screen-preload" class="screen active">
    <div class="preload-hero">
      <div class="preload-logo">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#aac4ff" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <h1 class="titulo-hero">Prueba tus imágenes</h1>
      <p class="subtitulo-hero">Selecciona la condición que deseas analizar</p>
      <div id="disease-buttons" class="disease-buttons">
        <span class="loading-msg">Cargando modelos…</span>
      </div>
    </div>
  </div>

  <!-- ── Pantalla 2: Carga y análisis ── -->
  <div id="screen-analyze" class="screen">
    <div class="container">
      <div class="card">
        <button id="btn-back-analyze" class="btn-back">&#8592; Cambiar condición</button>
        <h2 id="analyze-title" class="analyze-title"></h2>

        <form id="form">
          <label id="upload-label" class="upload-label" for="file">
            <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
            </svg>
            <span id="upload-text">Haz clic o arrastra una imagen aquí</span>
            <input type="file" id="file" accept="image/*" />
          </label>

          <div id="preview-wrap" class="preview-wrap" style="display:none">
            <img id="preview-img" alt="Vista previa" />
          </div>

          <button type="submit" id="btn-predict" class="btn-primary" disabled>Analizar imagen</button>
        </form>

        <div id="progress-wrap" class="progress-wrap" style="display:none">
          <p class="progress-label">Analizando imagen, por favor espera…</p>
          <div class="progress-track">
            <div id="progress-fill" class="progress-fill"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Pantalla 3: Resultados ── -->
  <div id="screen-results" class="screen">
    <div class="container">
      <div class="card results-card">
        <h2 class="results-title">Resultado del análisis</h2>
        <div id="result-tag" class="result-tag"></div>
        <div id="info" class="result-info"></div>
        <img id="gradcam" alt="Mapa de activación" class="gradcam-img" style="display:none" />
        <button id="btn-new" class="btn-primary btn-new">&#8592; Nueva prueba</button>
      </div>
    </div>
  </div>

</body>
</html>
